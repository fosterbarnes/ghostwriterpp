<html lang="en">
    <meta charset="utf-8">
    <head>
        <script>
            MathJax = {
                tex: {
                    inlineMath: [['$', '$'], ['\\(', '\\)'], ['\\[', '\\]']]
                }
            };

            function scrollToHeading(headingNumber) {
                var headers = document.querySelectorAll("div > h1, div > h2, div > h3, div > h4, div > h5, div > h6");

                if ((headingNumber > 0) && (headingNumber <= headers.length)) {
                    headers[headingNumber - 1].scrollIntoView();
                }
            }
        </script>
        <script type="text/javascript" id="MathJax-script" src="qrc:3rdparty/MathJax/bin/tex-svg-full.js"></script>
        <script language='Javascript'  type='text/javascript' src="qrc:3rdparty/react/react.production.min.js"></script>
        <script language='Javascript'  type='text/javascript' src="qrc:3rdparty/react/react-dom.production.min.js"></script>
        <script language='Javascript'  type='text/javascript' src="qrc:3rdparty/react/html-react-parser.js"></script>
        <script language='Javascript'  type='text/javascript' src="qrc:/qtwebchannel/qwebchannel.js"></script>
    </head>
    <body>
        <div id="livepreviewplaceholder"><p></p></div>
        <script language='Javascript' type='text/javascript'>

            function gwEditableTextContent(root) {
                var out = '';
                var walker = document.createTreeWalker(root, NodeFilter.SHOW_ALL, {
                    acceptNode: function (n) {
                        if (n !== root && n.nodeType === 1
                                && n.getAttribute('contenteditable') === 'false') {
                            return NodeFilter.FILTER_REJECT;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                });
                var n;
                while ((n = walker.nextNode())) {
                    if (n.nodeType === 3) {
                        out += n.nodeValue;
                    } else if (n.nodeType === 1 && (n.tagName || '').toLowerCase() === 'br') {
                        out += '\n';
                    }
                }
                return out;
            }

            function gwClosestEditable(target) {
                if (!target) {
                    return null;
                }
                var n = target;
                while (n && n.nodeType !== 1) {
                    n = n.parentNode;
                }
                return n && n.closest ? n.closest('[data-gw-edit-kind]') : null;
            }

            function gwPreviewInputPlain(kind, el) {
                if (kind === 'listitem' || kind === 'paragraph') {
                    return gwEditableTextContent(el);
                }
                return el.textContent != null ? el.textContent : el.innerText;
            }

            function gwShiftEditableOffsets(fromPos, delta) {
                if (!delta) {
                    return;
                }
                var attrs = ['data-gw-text-start', 'data-gw-text-end', 'data-gw-checkbox-source'];
                for (var ai = 0; ai < attrs.length; ai++) {
                    var a = attrs[ai];
                    var nodes = document.querySelectorAll('[' + a + ']');
                    for (var i = 0; i < nodes.length; i++) {
                        var v = parseInt(nodes[i].getAttribute(a), 10);
                        if (!isNaN(v) && v >= fromPos) {
                            nodes[i].setAttribute(a, String(v + delta));
                        }
                    }
                }
            }

            function installPreviewEditBridge(proxy) {
                if (window.__gwPreviewEditInstalled) {
                    window.previewProxy = proxy;
                    return;
                }
                window.__gwPreviewEditInstalled = true;
                window.previewProxy = proxy;

                if (proxy.previewEditOffsetsShifted && proxy.previewEditOffsetsShifted.connect) {
                    proxy.previewEditOffsetsShifted.connect(gwShiftEditableOffsets);
                }

                document.addEventListener('focusin', function (ev) {
                    var el = gwClosestEditable(ev.target);
                    if (!el || !window.previewProxy) {
                        return;
                    }
                    var kind = el.getAttribute('data-gw-edit-kind');
                    if (kind === 'tasklist') {
                        return;
                    }
                    var s = parseInt(el.getAttribute('data-gw-text-start'), 10);
                    var e = parseInt(el.getAttribute('data-gw-text-end'), 10);
                    if (isNaN(s) || isNaN(e)) {
                        return;
                    }
                    window.previewProxy.beginPreviewEdit(kind, s, e);
                }, true);

                document.addEventListener('focusout', function (ev) {
                    if (!window.previewProxy) {
                        return;
                    }
                    if (gwClosestEditable(ev.relatedTarget)) {
                        return;
                    }
                    window.previewProxy.endPreviewEdit();
                }, true);

                document.addEventListener('input', function (ev) {
                    var el = gwClosestEditable(ev.target);
                    if (!el || !window.previewProxy) {
                        return;
                    }
                    var kind = el.getAttribute('data-gw-edit-kind');
                    if (kind === 'tasklist') {
                        return;
                    }
                    var txt = gwPreviewInputPlain(kind, el);
                    window.previewProxy.applyPreviewEdit(txt);
                }, true);

                document.addEventListener('change', function (ev) {
                    var cb = ev.target && ev.target.closest
                        ? ev.target.closest('[data-gw-edit-kind="tasklist"]')
                        : null;
                    if (!cb || !window.previewProxy) {
                        return;
                    }
                    var off = parseInt(cb.getAttribute('data-gw-checkbox-source'), 10);
                    if (isNaN(off)) {
                        return;
                    }
                    window.previewProxy.togglePreviewCheckbox(off, !!ev.target.checked);
                }, true);
            }

            class LivePreview extends React.Component {
                constructor(props) {
                    super(props);
                    
                    this.initializeWebChannel = this.initializeWebChannel.bind(this);
                    this.loadStyleSheet = this.loadStyleSheet.bind(this);
                    this.updateLivePreview = this.updateLivePreview.bind(this);
                    this.setMathEnabled = this.setMathEnabled.bind(this);
                    this.scrollToChange = this.scrollToChange.bind(this);

                    this.mutationObserver = new MutationObserver(
                        this.scrollToChange
                    );

                    this.scrollElement = null;

                    this.mutationObserver.observe(
                        document.getElementById("livepreviewplaceholder"),
                        {
                            attributes: true,
                            characterData: true,
                            childList: true,
                            subtree: true,
                            attributeOldValue: false,
                            characterDataOldValue: false
                        }
                    );

                    this.state = {
                        livePreviewHTML: '',
                        mathEnabled: false
                    };

                    new QWebChannel(qt.webChannelTransport,
                        this.initializeWebChannel
                    );
                }

                initializeWebChannel(channel) {
                    var proxy = channel.objects.previewProxy;

                    installPreviewEditBridge(proxy);

                    this.loadStyleSheet(proxy.styleSheet);
                    proxy.styleSheetChanged.connect(this.loadStyleSheet);

                    this.updateLivePreview(proxy.htmlContent);
                    proxy.htmlChanged.connect(this.updateLivePreview);

                    this.setMathEnabled(proxy.mathEnabled);
                    proxy.mathToggled.connect(this.setMathEnabled);
                }

                loadStyleSheet(css) {
                    var cssElem = document.getElementById('ghostwriter_css');

                    if (cssElem) {
                        cssElem.textContent = css;
                    }
                    else {
                        cssElem  = document.createElement('style');
                        cssElem.id   = 'ghostwriter_css';
                        cssElem.type = 'text/css';
                        cssElem.media = 'all';
                        cssElem.textContent = css;
                        document.head.appendChild(cssElem);
                    }
                }

                updateLivePreview(html) {
                    this.setState({ livePreviewHTML: html });

                    // Call MathJax to update document, if the library is
                    // available and the math feature is enabled.
                    if ((typeof window.MathJax !== 'undefined')
                            && (this.state.mathEnabled)) {
                        window.MathJax.typeset();
                    }
                }

                setMathEnabled(enabled) {
                    this.setState({ mathEnabled: enabled });

                    // Clear out the old MathJax data in the DOM, otherwise
                    // React will not properly diff the old and new
                    // content where equations appear.
                    var previousHtml = this.state.livePreviewHTML;
                    this.updateLivePreview("");
                    
                    // Restore the old content without the math.
                    this.updateLivePreview(previousHtml);
                }

                getLivePreviewContent() {
                    return this.state.livePreviewHTML;
                }

                scrollToChange(mutations) {
                    return;
                }

                render() {
                    return React.createElement('div', null,
                        HTMLReactParser(this.getLivePreviewContent()));
                }
            }

            class ErrorBoundary extends React.Component {
                constructor(props) {
                    super(props);
                    this.state = { hasError: false };
                }

                componentDidCatch(error, info) {
                    this.setState({ hasError: true });
                }
                
                render() {
                    if (this.state.hasError) {
                        this.setState({ hasError: false });
                        return "<p>Game over!  Insert coin.</p>";
                    }
                    
                    return this.props.children;
                }
            }

            ReactDOM.render(
                React.createElement(ErrorBoundary,
                    null,
                    React.createElement(LivePreview, null)),
                document.getElementById('livepreviewplaceholder'));

        </script>
    </body>
</html>
